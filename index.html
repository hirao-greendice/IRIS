<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IRIS Sokoban Base</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="game-shell" aria-label="Stage viewport">
    <div id="stage-area" class="stage-area">
      <div id="stage-board" class="stage-board" aria-live="polite"></div>
    </div>
    <div class="controls" aria-label="Movement controls">
      <button type="button" class="control-button control-button--up" data-move="up" aria-label="Move up">&#8593;</button>
      <button type="button" class="control-button control-button--left" data-move="left" aria-label="Move left">&#8592;</button>
      <button type="button" class="control-button control-button--down" data-move="down" aria-label="Move down">&#8595;</button>
      <button type="button" class="control-button control-button--right" data-move="right" aria-label="Move right">&#8594;</button>
    </div>
  </section>

  <script type="module" src="game.js"></script>
</body>
</html>
